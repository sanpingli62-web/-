<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>休斯顿高真16位进制号码生成引擎</title>
    <link rel="manifest" href="manifest.json">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050b14; }
        .mono-font { font-family: 'JetBrains Mono', monospace; }
        .custom-glow { box-shadow: 0 0 30px -5px rgba(59, 130, 246, 0.15); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.6); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(59, 130, 246, 0.4); border-radius: 4px; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col justify-between">
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 translate-y-[-100px] opacity-0 transition-all duration-400 ease-out flex items-center gap-2 bg-slate-800 border border-emerald-500/50 text-emerald-400 px-6 py-3 rounded-2xl shadow-2xl z-50">
        <i data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-text" class="text-sm font-bold tracking-wide">操作成功</span>
    </div>

    <div class="container mx-auto px-4 py-6 max-w-6xl flex-grow">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-4xl font-extrabold tracking-tight text-white mb-3">16位进制<span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">高保真号码</span>系统</h1>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-4 flex flex-col gap-6">
                <div class="bg-slate-900 border border-slate-800 rounded-2xl p-6 custom-glow">
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">产出数量</label>
                    <input type="number" id="quantity" value="1000" min="1" max="50000" class="w-full bg-slate-950 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 font-bold text-lg mb-4">
                    <button id="generate-btn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 rounded-xl shadow-lg transition-all flex items-center justify-center gap-2">开始生成</button>
                </div>
                <div id="stats-panel" class="bg-slate-900 border border-slate-800 rounded-2xl p-5 custom-glow hidden"></div>
            </div>
            <div class="lg:col-span-8 bg-slate-900 border border-slate-800 rounded-2xl p-6 flex flex-col h-[600px] custom-glow">
                <div id="output-container" class="flex-grow overflow-y-auto custom-scrollbar"></div>
                <div id="stats-bar" class="hidden pt-3 border-t border-slate-800 text-xs text-slate-500"></div>
            </div>
        </div>
    </div>
    <script>
        lucide.createIcons();
        // ... (保持你原有的 JavaScript 逻辑逻辑不变)
    </script>
</body>
</html>
