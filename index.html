<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红色预警：高真进制引擎</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #0f0505; color: #f87171; font-family: sans-serif; }
        .bg-red-glow { box-shadow: 0 0 20px rgba(220, 38, 38, 0.3); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(220, 38, 38, 0.5); border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center">
    <div class="max-w-2xl w-full bg-slate-950 border border-red-900 rounded-2xl p-6 bg-red-glow">
        <h1 class="text-2xl font-bold text-red-500 mb-6 text-center">Houston Hex Gen (Red Edition)</h1>
        
        <div class="mb-6">
            <label class="block text-xs font-semibold text-red-400 uppercase tracking-wider mb-2">生成数量</label>
            <input type="number" id="quantity" value="500" min="1" max="500" class="w-full bg-slate-900 border border-red-900 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-red-500 font-bold">

        </div>

        <button id="generate-btn" class="w-full bg-red-700 hover:bg-red-600 text-white py-4 rounded-xl font-bold transition-all shadow-lg">启动红色引擎</button>
        
        <div id="output-container" class="mt-6 text-red-400 font-mono text-xs h-64 overflow-y-auto bg-slate-900 p-4 rounded-xl border border-red-900/50 custom-scrollbar">
            <p>等待指令：请点击启动红色引擎...</p>
        </div>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('generate-btn').onclick = () => {
        const count = Math.min(document.getElementById('quantity').value, 500);
         const container = document.getElementById('output-container');
            container.innerHTML = `<p class="text-red-500">正在通过红色通道演算 ${count} 个号码...</p>`;

            
            // 这里保留了核心逻辑的结构
            setTimeout(() => {
                let results = "";
                for(let i=0; i<count; i++) {

                    results += `HEX: ${Math.random().toString(16).substring(2, 18).toUpperCase()}<br>`;
                }
                container.innerHTML = results;
            }, 800);
        };
    </script>
</body>

</html>
